function render(){
  const q = document.getElementById('search').value.toLowerCase().trim();
  const af = document.getElementById('area-filter').value;
  const sf = document.getElementById('source-filter').value;
  const filtered = data.filter(d => {
    if (af !== 'all' && d.area !== af) return false;
    if (sf !== 'all' && d.method !== sf) return false;
    if (q && !(d.name.toLowerCase().includes(q) || d.date.toLowerCase().includes(q) || d.area.toLowerCase().includes(q))) return false;
    return true;
  });
  const rows = document.getElementById('rows');
  rows.innerHTML = filtered.map((d, i) => {
    const bg = i % 2 === 0 ? 'transparent' : 'var(--color-background-secondary)';
    const methodColor = d.method === 'Web' ? '#185FA5' : '#854F0B';
    const methodBg = d.method === 'Web' ? '#E6F1FB' : '#FAEEDA';
    return `<div style="display: grid; grid-template-columns: 2.2fr 2fr 1.2fr 0.9fr; padding: 10px 14px; background: ${bg}; font-size: 13px; align-items: center; border-bottom: 0.5px solid var(--color-border-tertiary); gap: 8px;">
      <div style="font-weight: 500; color: var(--color-text-primary); line-height: 1.4;">${d.name}</div>
      <div style="color: var(--color-text-secondary); line-height: 1.4; font-size: 12px;">${d.date}</div>
      <div style="color: var(--color-text-tertiary); font-size: 12px;">${d.area}</div>
      <div style="text-align: right;"><span style="display: inline-block; padding: 2px 8px; border-radius: var(--border-radius-md); background: ${methodBg}; color: ${methodColor}; font-size: 11px; font-weight: 500;">${d.method}</span></div>
    </div>`;
  }).join('');
  document.getElementById('count').textContent = `${filtered.length} / ${data.length} 件を表示`;

  // Stats
  const total = data.length;
  const webCount = data.filter(d => d.method === 'Web').length;
  const telCount = total - webCount;
  const areas = new Set(data.map(d => d.area)).size;
  const stats = [
    {label: '掲載山小屋数', val: total},
    {label: 'Web受付', val: webCount},
    {label: '電話受付', val: telCount},
    {label: '山域数', val: areas}
  ];
  document.getElementById('stat-bar').innerHTML = stats.map(s =>
    `<div style="background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px 14px;">
      <div style="font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px;">${s.label}</div>
      <div style="font-size: 22px; font-weight: 500;">${s.val}</div>
    </div>`).join('');
}
document.getElementById('search').addEventListener('input', render);
document.getElementById('area-filter').addEventListener('change', render);
document.getElementById('source-filter').addEventListener('change', render);
render();
</script>
